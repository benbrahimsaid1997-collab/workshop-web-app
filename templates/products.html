{% extends "base.html" %}
{% block title %}المنتجات{% endblock %}
{% block content %}
<h2>📦 المنتجات</h2>
<div id="products-container">جاري التحميل...</div>
<script>
fetch('/api/Product')
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('products-container');
        container.innerHTML = data.map(p => `
            <div class="card">
                <h3>${p.name}</h3>
                ${p.imagePath ? `<img src="${p.imagePath}" style="width:100px; height:100px; object-fit:cover; border-radius:10px;">` : ''}
                <p>💰 السعر: ${p.price} دج</p>
                <p>${p.isAvailable ? '✅ متوفر' : '❌ غير متوفر'}</p>
            </div>
        `).join('');
    });
</script>
{% endblock %}
