{% extends 'base.html' %}
{% block content %}
<div class="header">
    <a href="/" class="back-btn">↩ رجوع</a>
    <h1>🏭 المرايب</h1>
    <button onclick="loadGarages()" style="background:rgba(255,255,255,0.2);border:none;color:white;
        padding:7px 13px;border-radius:20px;cursor:pointer;font-size:14px;">🔄</button>
</div>

<div class="page-content">
    <div id="content"></div>
    <a href="/booking" class="btn btn-purple" style="margin-top: 6px;">📅 &nbsp; احجز موعدك الآن</a>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadGarages() {
    const el = document.getElementById('content');
    el.innerHTML = '<div class="state-box"><div class="icon">⏳</div>جاري التحميل...</div>';
    try {
        const data = await apiFetch('/Garage/status');
        if (!data || !data.length) {
            el.innerHTML = '<div class="state-box"><div class="icon">🏭</div>لا توجد مرايب متاحة</div>';
            return;
        }
        el.innerHTML = data.map(g => {
            let badge, dot;
            if (g.Status === 'Available') {
                badge = '<span class="badge badge-success">🟢 شاغر</span>';
            } else if (g.Status === 'Partial') {
                badge = '<span class="badge badge-warning">🟡 جزئي</span>';
            } else {
                badge = '<span class="badge badge-danger">🔴 مشغول</span>';
            }
            const time = g.EstimatedMinutes === 0
                ? '<strong style="color:#1abf66">متاح الآن</strong>'
                : `<strong>${g.EstimatedMinutes} دقيقة</strong>`;
            return `<div class="card">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
                    <div>
                        <div style="font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:3px">${g.Name || ''}</div>
                        <div style="font-size:13px;color:#888">${g.Description || ''}</div>
                    </div>
                    ${badge}
                </div>
                <div style="font-size:13px;color:#555;border-top:1px solid #f0f0f5;padding-top:9px">
                    ⏱️ الوقت المتوقع: ${time}
                </div>
            </div>`;
        }).join('');
    } catch (err) {
        el.innerHTML = `<div class="state-box">
            <div class="icon">❌</div>
            ${err.message}
        </div>`;
    }
}
loadGarages();
</script>
{% endblock %}
