{% extends "base.html" %}
{% block title %}المرايب{% endblock %}
{% block content %}
<h2>🏗️ حالة المرايب</h2>
<div id="garages-container">جاري التحميل...</div>
<script>
fetch('/api/Garage/status')
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('garages-container');
        container.innerHTML = data.map(g => `
            <div class="card">
                <h3>${g.name}</h3>
                <p>${g.description}</p>
                <p>الحالة: ${g.status === 'Available' ? '🟢 شاغر' : g.status === 'Partial' ? '🟡 جزئي' : '🔴 مشغول'}</p>
                <p>⏱️ الوقت المتوقع: ${g.estimatedMinutes} دقيقة</p>
                <p>👥 في الانتظار: ${g.waitingCount || 0}</p>
                <h4>الخدمات المتاحة:</h4>
                <ul>${(g.services || []).map(s => `<li>${s.name} (${s.estimatedMinutes} دقيقة)</li>`).join('')}</ul>
            </div>
        `).join('');
    });
</script>
{% endblock %}
