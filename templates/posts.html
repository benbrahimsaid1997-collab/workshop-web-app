{% extends "base.html" %}
{% block title %}المنشورات{% endblock %}
{% block content %}
<h2>📢 المنشورات</h2>
<div id="posts-container">جاري التحميل...</div>
<script>
fetch('/api/Post')
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('posts-container');
        container.innerHTML = data.map(p => `
            <div class="card">
                <h3>${p.title}</h3>
                <p>${p.text || ''}</p>
                ${p.imagePath ? `<img src="${p.imagePath}" style="max-width:100%; border-radius:5px; margin:10px 0;">` : ''}
                ${p.videoUrl ? `<a href="${p.videoUrl}" target="_blank" class="btn" style="display:inline-block;">▶️ مشاهدة الفيديو</a>` : ''}
                <small style="color:#999; display:block; margin-top:10px;">📅 ${new Date(p.createdAt).toLocaleDateString('ar')}</small>
            </div>
        `).join('');
    });
</script>
{% endblock %}
