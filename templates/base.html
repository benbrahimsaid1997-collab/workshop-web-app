{% extends 'base.html' %}
{% block content %}
<div style="padding: 36px 22px; display: flex; flex-direction: column; min-height: 100vh;">

    <!-- Header with bell -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;margin-top:16px">
        <div style="text-align:center;flex:1">
            <div style="font-size:62px;margin-bottom:10px">🔧</div>
            <h1 style="font-size:28px;font-weight:800;color:#0e8fdb;margin-bottom:4px">ورشة السيارات</h1>
            <p style="font-size:15px;color:#888">خدمات صيانة احترافية</p>
        </div>
        <a href="/my-notifications"
           style="position:relative;text-decoration:none;background:white;width:46px;height:46px;
                  border-radius:50%;display:flex;align-items:center;justify-content:center;
                  box-shadow:0 2px 12px rgba(0,0,0,0.1);font-size:22px;flex-shrink:0;align-self:flex-start">
            🔔
            <span id="bell-badge"
                  style="display:none;position:absolute;top:-2px;right:-2px;background:#e6293e;
                         color:white;border-radius:50%;width:18px;height:18px;font-size:11px;
                         font-weight:700;align-items:center;justify-content:center">0</span>
        </a>
    </div>

    <!-- Nav buttons -->
    <div style="flex:1">
        <a href="/garages"  class="btn btn-success">🏭 &nbsp; المرايب</a>
        <a href="/posts"    class="btn btn-primary">📢 &nbsp; المنشورات</a>
        <a href="/products" class="btn btn-orange">🛒 &nbsp; المنتجات</a>
        <a href="/booking"  class="btn btn-purple">📅 &nbsp; حجز موعد</a>
        <a href="/my-notifications" class="btn btn-teal">🔔 &nbsp; إشعاراتي</a>
    </div>

    <!-- Footer -->
    <div style="text-align:center;padding:10px 0 0;color:#bbb;font-size:12px">
        جميع الحقوق محفوظة © 2025
    </div>
</div>
{% endblock %}
