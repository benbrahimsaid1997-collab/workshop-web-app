{% extends "base.html" %}
{% block title %}الإشعارات{% endblock %}
{% block content %}
<h2>🔔 الإشعارات</h2>
<div id="notifications-container">جاري التحميل...</div>
<script>
// للحصول على رقم الهاتف من localStorage أو prompt
let phone = localStorage.getItem('userPhone');
if (!phone) {
    phone = prompt('الرجاء إدخال رقم هاتفك لعرض الإشعارات');
    if (phone) localStorage.setItem('userPhone', phone);
}
if (phone) {
    fetch(`/notifications/${phone}`)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('notifications-container');
            if (data.length === 0) {
                container.innerHTML = '<div class="card">لا توجد إشعارات</div>';
            } else {
                container.innerHTML = data.map(n => `
                    <div class="card" style="${n.read ? 'opacity:0.7' : 'border-right:4px solid #2e7d32'}">
                        <p>${n.message}</p>
                        <small style="color:#999;">${n.timestamp}</small>
                    </div>
                `).join('');
            }
        });
} else {
    document.getElementById('notifications-container').innerHTML = '<div class="card">الرجاء إدخال رقم الهاتف لعرض الإشعارات</div>';
}
</script>
{% endblock %}
