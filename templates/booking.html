{% extends "base.html" %}
{% block title %}الحجز{% endblock %}
{% block content %}
<h2>📅 حجز موعد جديد</h2>
<div class="card">
    <form id="booking-form">
        <div style="margin-bottom: 15px;">
            <label>الاسم الكامل:</label>
            <input type="text" id="customerName" required style="width:100%; padding:8px; margin-top:5px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>رقم الهاتف:</label>
            <input type="tel" id="customerPhone" required style="width:100%; padding:8px; margin-top:5px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>الخدمة:</label>
            <select id="service" style="width:100%; padding:8px; margin-top:5px; border:1px solid #ddd; border-radius:5px;">
                <option>تغيير زيت</option>
                <option>ميكانيك عام</option>
                <option>فحص كمبيوتر</option>
                <option>إصلاح فرامل</option>
            </select>
        </div>
        <div style="margin-bottom: 15px;">
            <label>التاريخ:</label>
            <input type="date" id="date" required style="width:100%; padding:8px; margin-top:5px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>الوقت:</label>
            <input type="time" id="time" required style="width:100%; padding:8px; margin-top:5px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <button type="submit" class="btn">✅ تأكيد الحجز</button>
    </form>
    <div id="result" style="margin-top: 20px; display: none;"></div>
</div>
<script>
document.getElementById('booking-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        customerName: document.getElementById('customerName').value,
        customerPhone: document.getElementById('customerPhone').value,
        service: document.getElementById('service').value,
        date: document.getElementById('date').value,
        time: document.getElementById('time').value
    };
    document.getElementById('result').style.display = 'none';
    const btn = document.querySelector('#booking-form button');
    btn.textContent = 'جاري الحجز...';
    btn.disabled = true;
    try {
        const res = await fetch('/api/Booking/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        document.getElementById('result').innerHTML = `
            <div style="background:#d4edda; padding:15px; border-radius:5px; color:#155724;">
                <h4>✅ ${result.Message}</h4>
                <p>📍 رقم انتظارك: ${result.WaitingNumber}</p>
                <p>👥 عدد من ينتظرون قبلك: ${result.PeopleAhead}</p>
                <p>⏱️ الوقت المتوقع: ${result.EstimatedTime}</p>
            </div>
        `;
        document.getElementById('result').style.display = 'block';
        document.getElementById('booking-form').reset();
    } catch (err) {
        document.getElementById('result').innerHTML = `<div style="background:#f8d7da; padding:15px; border-radius:5px; color:#721c24;">❌ حدث خطأ: ${err.message}</div>`;
        document.getElementById('result').style.display = 'block';
    } finally {
        btn.textContent = '✅ تأكيد الحجز';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
